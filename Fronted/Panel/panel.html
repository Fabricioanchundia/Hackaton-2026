<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TutorIA Rural - Panel Docente</title>
<style>
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 700px;
    margin: 30px auto;
    background: #f5f5f5;
    padding: 20px;
  }
  h1 { color: #2d5f3f; }
  .info {
    background: #fff8e1;
    border-left: 4px solid #f0c000;
    padding: 10px 15px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }
  th { background: #2d5f3f; color: white; }
  tr:hover { background: #f9f9f9; }
  .vacio { text-align: center; padding: 30px; color: #888; }
  button {
    background: #2d5f3f;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 15px;
  }
</style>
</head>
<body>

<h1>👩‍🏫 Panel del Docente</h1>
<div class="info">
  Aquí aparecen los estudiantes que necesitan ayuda directa del profesor —
  el agente los escala automáticamente después de 3 respuestas seguidas en rojo 🔴.
</div>

<button onclick="cargarEscalados()">🔄 Actualizar</button>

<table id="tabla">
  <thead>
    <tr>
      <th>Estudiante</th>
      <th>Tema</th>
      <th>Motivo del escalado</th>
    </tr>
  </thead>
  <tbody id="cuerpo-tabla"></tbody>
</table>

<script>
async function cargarEscalados() {
  const res = await fetch("/api/escalados");
  const data = await res.json();
  const cuerpo = document.getElementById("cuerpo-tabla");
  cuerpo.innerHTML = "";

  if (data.escalados.length === 0) {
    cuerpo.innerHTML = `<tr><td colspan="3" class="vacio">
      Sin casos escalados por ahora. Cuando un estudiante falle 3 veces
      seguidas en un tema, aparecerá aquí.</td></tr>`;
    return;
  }

  data.escalados.forEach(caso => {
    const fila = document.createElement("tr");
    fila.innerHTML = `
      <td>${caso.estudiante}</td>
      <td>${caso.tema}</td>
      <td>${caso.motivo}</td>
    `;
    cuerpo.appendChild(fila);
  });
}

// Cargar al abrir, y actualizar cada 8 segundos automáticamente
cargarEscalados();
setInterval(cargarEscalados, 8000);
</script>

</body>
</html>
